version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: manamap_postgres
    restart: always
    environment:
      POSTGRES_USER: manamap_user
      POSTGRES_PASSWORD: manamap_password
      POSTGRES_DB: manamap_ledger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manamap_user -d manamap_ledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: manamap_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://manamap_user:manamap_password@db:5432/manamap_ledger_db
      - GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: manamap_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
